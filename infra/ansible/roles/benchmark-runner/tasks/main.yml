---
# rsync the repo from the operator's machine to /opt/repo (incl. data/.cache/),
# install Python deps via uv, run both benchmarks, fetch JSON results back.
#
# Variables:
#   platform_name: per-host (e.g., gp3-3k, nirvana-abs)
#   repo_root_local: path to repo on operator's machine (defaults to .. of inventory)
#   dataset: which dataset to benchmark (default: medium)

- name: Ensure /opt/repo exists
  file:
    path: /opt/repo
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Sync repo to VM (excluding heavy/unneeded files)
  synchronize:
    src: "{{ repo_root_local }}/"
    dest: /opt/repo/
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.venv"
      - "--exclude=__pycache__"
      - "--exclude=.claude"
      - "--exclude=qdrant_storage"
      - "--exclude=results"
      - "--exclude=infra/terraform/.terraform"
      - "--exclude=infra/terraform/terraform.tfstate*"
      # Only ship the active dataset's precomputed embedding cache (other
      # datasets' caches are 100s of MB each — pure dead weight on the wire).
      - "--include=data/.cache/{{ dataset }}_*"
      - "--exclude=data/.cache/small_*"
      - "--exclude=data/.cache/medium_*"
      - "--exclude=data/.cache/large_*"
  become: false

- name: Install uv
  shell: |
    set -e
    if ! command -v uv >/dev/null 2>&1; then
      curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
  args:
    creates: /home/ubuntu/.local/bin/uv
  become: false

- name: Create venv and install deps
  shell: |
    set -e
    export PATH=$HOME/.local/bin:$PATH
    cd /opt/repo
    uv venv --python 3.11 --allow-existing
    uv pip install -r requirements.txt
  become: false
  register: pip_install
  changed_when: "'Installed' in pip_install.stdout or 'Resolved' in pip_install.stdout"

# =============================================================================
# Run benchmarks
# =============================================================================

- name: Run ingest benchmark
  shell: |
    set -e
    cd /opt/repo
    .venv/bin/python -m benchmarks.ingest {{ dataset }} \
      --platform={{ platform_name }} \
      --json=/opt/benchmark/ingest_{{ dataset }}.json
  become: false
  environment:
    QDRANT_HOST: localhost
    # Xet (HF's content-addressed transfer) hangs on fresh AWS VMs — fall back
    # to the standard HTTP path. Plain curl downloads the same file in ~1s.
    HF_HUB_DISABLE_XET: "1"
  register: ingest_result

- name: Populate Qdrant for retrieval benchmark (app.ingest)
  shell: |
    set -e
    cd /opt/repo
    .venv/bin/python -m app.ingest {{ dataset }} --recreate
  become: false
  environment:
    QDRANT_HOST: localhost
    HF_HUB_DISABLE_XET: "1"
  register: app_ingest_result

- name: Run retrieval benchmark sweep (concurrency 1, 4, 16, 64)
  # Each iteration drops the OS page cache before running so every run starts
  # from cold storage and the comparison is fair across concurrency levels.
  # qdrant_on_disk=true is what makes those reads actually hit the block device.
  include_tasks: retrieval_sweep.yml
  loop: "{{ retrieval_concurrency_levels | default([1, 4, 16, 64]) }}"
  loop_control:
    loop_var: concurrency

# =============================================================================
# Fetch all three JSON files back to operator's machine
# =============================================================================

- name: Fetch ingest JSON
  fetch:
    src: /opt/benchmark/ingest_{{ dataset }}.json
    dest: "{{ repo_root_local }}/results/{{ platform_name }}/ingest_{{ dataset }}.json"
    flat: yes

- name: Fetch retrieval sweep JSONs
  fetch:
    src: /opt/benchmark/retrieval_{{ dataset }}_c{{ item }}.json
    dest: "{{ repo_root_local }}/results/{{ platform_name }}/retrieval_{{ dataset }}_c{{ item }}.json"
    flat: yes
  loop: "{{ retrieval_concurrency_levels | default([1, 4, 16, 64]) }}"

- name: Fetch fio.json
  fetch:
    src: /opt/benchmark/fio.json
    dest: "{{ repo_root_local }}/results/{{ platform_name }}/fio.json"
    flat: yes

- name: Display run summary
  debug:
    msg: |
      [{{ platform_name }}] benchmarks complete.
      Results saved to results/{{ platform_name }}/
