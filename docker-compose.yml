version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
    # On Nirvana Cloud: bind this to a mounted ABS NVMe volume for
    # 10,000+ IOPS and sub-millisecond storage latency.
    # See infra/volume_setup.md for instructions.
